<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jaaang ㅈㅇㅇ Brand Base</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, Pretendard, Arial, sans-serif;
        color: #101114;
        background: #eef0f3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 32px;
        overflow-x: hidden;
      }

      header,
      main {
        width: 100%;
        max-width: 1040px;
        margin-inline: auto;
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #5b626d;
        font-size: 14px;
        line-height: 1.55;
      }

      main {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr));
        gap: 18px;
      }

      figure {
        margin: 0;
        min-width: 0;
        overflow: hidden;
        border: 1px solid #d6dbe2;
        border-radius: 8px;
        background: #fff;
        padding: 14px;
      }

      .preview {
        display: grid;
        min-height: 190px;
        place-items: center;
        border-radius: 8px;
        background: #f8f9fb;
        padding: 20px;
      }

      .preview.is-dark {
        background: #101114;
      }

      .preview img {
        width: 100%;
        max-width: 100%;
        object-fit: contain;
      }

      .preview .wordmark {
        aspect-ratio: 690.53 / 256.36;
      }

      .preview .tile {
        width: min(100%, 180px);
        aspect-ratio: 1 / 1;
        border-radius: 8px;
      }

      .small-strip {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        background: #f3f4f6;
      }

      .small-strip img {
        width: 32px;
        height: 32px;
        flex: 0 0 auto;
      }

      .small-strip img:first-child {
        width: 24px;
        height: 24px;
      }

      figcaption {
        margin-top: 12px;
        color: #4f5661;
        font-size: 13px;
      }

      .name {
        display: block;
        margin-bottom: 4px;
        color: #101114;
        font-weight: 800;
      }

      .meta {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      @media (max-width: 560px) {
        body {
          padding: 18px;
        }

        header,
        main {
          max-width: calc(100vw - 36px);
        }

        h1 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Jaaang ㅈㅇㅇ Brand Base</h1>
      <p>The supplied ㅈㅇㅇ SVG is now the single source direction. The other experimental marks were removed; these are usage variants derived from that geometry.</p>
    </header>
    <main>
      <figure>
        <div class="preview">
          <img class="wordmark" src="jaaang-mark-06-joo-word.svg" alt="ㅈㅇㅇ wordmark">
        </div>
        <figcaption><span class="name">Base Wordmark</span><span class="meta">Original ㅈㅇㅇ geometry with the reinforced angular ㅈ.</span></figcaption>
      </figure>
      <figure>
        <div class="preview">
          <img class="tile" src="jaaang-mark-06-joo-word-tile.svg" alt="ㅈㅇㅇ app tile">
        </div>
        <div class="small-strip"><img src="jaaang-mark-06-joo-word-tile.svg" alt=""><img src="jaaang-mark-06-joo-word-tile-mono.svg" alt=""><span>24 / 32px</span></div>
        <figcaption><span class="name">App Tile</span><span class="meta">Square launcher form using only the ㅈㅇㅇ base.</span></figcaption>
      </figure>
      <figure>
        <div class="preview is-dark">
          <img class="tile" src="jaaang-mark-06-joo-word-tile-mono.svg" alt="ㅈㅇㅇ mono app tile">
        </div>
        <div class="small-strip"><img src="jaaang-mark-06-joo-word-tile-mono.svg" alt=""><img src="jaaang-mark-06-joo-word-tile.svg" alt=""><span>24 / 32px</span></div>
        <figcaption><span class="name">Mono Tile</span><span class="meta">Black-and-white usage variant for favicon, mask, and constrained surfaces.</span></figcaption>
      </figure>
    </main>
  </body>
</html>
