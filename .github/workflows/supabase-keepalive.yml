name: Supabase Keep Alive

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: https://ocxjqpjflikmnedvviag.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_b5D9HjHsuQqTy9gyB9sfYQ_ml3HZI8u
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 5 \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL}/rest/v1/items?select=id&limit=1"
